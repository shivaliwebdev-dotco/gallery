<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sanctify Gallery</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <section class="gallery-section">

        <div class="section-title">
            <h2>Our Gallery</h2>
            <p>
                A gallery filled with wagging tails, happy faces, and unforgettable moments.
            </p>
        </div>

        <div class="gallery-grid">

            <!-- 1 -->
            <div class="gallery-item">

                <img src="images/1pinscher.avif"
                    alt="Pinscher">

                <div class="gallery-content">
                    <h3>Pinscher</h3>
                </div>

            </div>

            <!-- 2 -->
            <div class="gallery-item">

                <img src="images/2goldador.avif"
                    alt="Golden Retriever + Labrador">

                <div class="gallery-content">
                    <h3>Goldador</h3>
                </div>

            </div>

            <!-- 3 -->
            <div class="gallery-item">

                <img src="images/3rottweiler.avif"
                    alt="Rottweiler">

                <div class="gallery-content">
                    <h3>Rottweiler</h3>
                </div>

            </div>

            <!-- 4 -->
            <div class="gallery-item">

                <img src="images/4aussie.avif"
                    alt="Australian Shepherd">

                <div class="gallery-content">
                    <h3>Australian Shepherd</h3>
                </div>

            </div>

            <!-- 5 -->
            <div class="gallery-item">

                <img src="images/5welshcorgi.avif"
                    alt="Welsh Corgi">

                <div class="gallery-content">
                    <h3>Welsh Corgi</h3>
                </div>

            </div>

            <!-- 6 -->
            <div class="gallery-item">

                <img src="images/6dalmation.jpg"
                    alt="Dalmation">

                <div class="gallery-content">
                    <h3>Dalmation</h3>
                </div>

            </div>

            <!-- 7 -->
            <div class="gallery-item">

                <img src="images/7pug.avif"
                    alt="Pug">

                <div class="gallery-content">
                    <h3>Pug</h3>
                </div>

            </div>

            <!-- 8 -->
            <div class="gallery-item">

                <img src="images/8terrier.jpg"
                    alt="Terrier">

                <div class="gallery-content">
                    <h3>Terrier</h3>
                </div>

            </div>

            <!-- 9 -->
            <div class="gallery-item">

                <img src="images/9samoyed.avif"
                    alt="Samoyed">

                <div class="gallery-content">
                    <h3>Samoyed</h3>
                </div>

            </div>

            <!-- 10 -->
            <div class="gallery-item">

                <img src="images/10bulldog.jpg"
                    alt="Bull Dog">

                <div class="gallery-content">
                    <h3>Bull Dog</h3>
                </div>

            </div>

            <!-- 11 -->
            <div class="gallery-item">

                <img src="images/11gsd.avif"
                    alt="German Shepherd">

                <div class="gallery-content">
                    <h3>German Shepherd</h3>
                </div>

            </div>

            <!-- 12 -->
            <div class="gallery-item">

                <img src="images/12frenchbulldog.avif"
                    alt="French Bulldog">

                <div class="gallery-content">
                    <h3>French Bulldog</h3>
                </div>

            </div>

            <!-- 13 -->
            <div class="gallery-item">

                <img src="images/13bostonterrier.jpg"
                    alt="Boston Terrier">

                <div class="gallery-content">
                    <h3>Boston Terrier</h3>
                </div>

            </div>

            <!-- 14 -->
            <div class="gallery-item">

                <img src="images/14goldie.avif"
                    alt="Golden Retriever">

                <div class="gallery-content">
                    <h3>Golden Retriever</h3>
                </div>

            </div>

            <!-- 15 -->
            <div class="gallery-item">

                <img src="images/15stbern.avif"
                    alt="St. Bernard">

                <div class="gallery-content">
                    <h3>St. Bernard</h3>
                </div>

            </div>

            <!-- 16 -->
            <div class="gallery-item">

                <img src="images/16indie.avif"
                    alt="Indian Dog">

                <div class="gallery-content">
                    <h3>Indie</h3>
                </div>

            </div>

        </div>

    </section>

    <!--========== LIGHTBOX ==========-->

    <div class="lightbox">

        <span class="close-btn">&times;</span>

        <button class="nav-btn prev">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <img id="lightbox-image" src="" alt="">

        <div class="lightbox-footer">

            <h3 id="image-title"></h3>

            <p id="image-counter"></p>

        </div>

        <button class="nav-btn next">
            <i class="fa-solid fa-chevron-right"></i>
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
